spring.application.name=SDP-TezTap

search.engine.url=${SEARCH_ENGINE_URL:http://localhost:8000}
#selenium.remote.url=${SELENIUM_REMOTE_URL:http://localhost:4444/wd/hub}
payment.url=${PAYMENT_URL:http://localhost:5000}

# ------------------------------
# SPRING DATASOURCE
# ------------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:SDP}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}

# ------------------------------
# JPA / HIBERNATE
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ------------------------------
# JWT
# ------------------------------
# your-very-long-secret-key-at-least-256-bits-long-here!!
app.jwt.secret=${JWT_KEY:SxyexhxcWb6PdaGMD0RtqfcfUZWIarcT}
app.jwt.expiration-ms=86400000

# ------------------------------
# SERVER
# ------------------------------
server.port=5000

# ------------------------------
# LOGGING
# ------------------------------
logging.level.org.springframework.scheduling=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.security.messaging=DEBUG
#logging.level.org.springframework.scheduling=ERROR
#logging.level.org.springframework=ERROR
#logging.level.org.hibernate=ERROR
#logging.level.org.apache.kafka=ERROR
#logging.level.root=ERROR
# ------------------------------
# SPRING SECURITY
# ------------------------------
#logging.level.org.springframework.security=TRACE
#logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
#logging.level.org.springframework.security.access=TRACE


# ------------------------------
# KAFKA
# ------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka.listener=WARN
spring.kafka.consumer.properties.max.poll.records=500000

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=default-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Jackson trusted packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ------------------------------
# REDIS
# ------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# ------------------------------
# ORS & OWM
# ------------------------------
ors.api.key=${ORS_API_KEY:e}
owm.api.key=${OWM_API_KEY:4}

# ------------------------------
# GOOGLE MAPS
# ------------------------------
google.maps.api-key=${GOOGLE_MAPS_API_KEY}
app.markets.sync.enabled=true