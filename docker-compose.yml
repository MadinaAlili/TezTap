  kafka:
    image: redpandadata/redpanda:v25.3.11
    container_name: kafka
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "12"
    ports:
      - "9092:9092"   # Kafka-compatible API
      - "9644:9644"   # Redpanda Admin API (optional, useful for health checks)
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
      - --overprovisioned
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
    environment:
      - REDPANDA_LOG_LEVEL=error
    mem_limit: 350m
    volumes:
      - kafka_data:/var/lib/redpanda/data
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health --api-urls localhost:9644 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s   # Redpanda starts faster than Kafka
    networks:
      - shared-net

