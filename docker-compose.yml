  # ── Spring Boot application ────────────────────────────────────────────────
  app:
    build: .
    container_name: sdp-app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "12"
    ports:
      - "5000:5000"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
#      kafka-init:
#        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Override bootstrap server so the app uses the Docker-internal listener
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # Keep JVM heap tight so the container doesn't OOM
#      - JAVA_OPTS=-Xmx300m -Xms300m -XX:MaxMetaspaceSize=128m -XX:+UseContainerSupport
#    mem_limit: 850m
    networks:
      - shared-net

networks:
  shared-net:
    external: true

volumes:
  kafka_data:
    driver: local